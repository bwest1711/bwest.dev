@import url('https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@600;800&family=IBM+Plex+Mono:wght@400;600&display=swap');
html,body{margin:0;padding:0;background:#0b0f1d}
.fsp{--bg:#0b0f1d;--panel:#121831;--panel2:#0e1426;--ink:#eef0fa;--dim:#9aa3c0;--kraft:#c9a36a;--caution:#e8590c;--line:#26304f;
 background:var(--bg);color:var(--ink);min-height:100vh;font:14px/1.45 'IBM Plex Mono',ui-monospace,monospace;padding:18px;box-sizing:border-box}
.fsp *{box-sizing:border-box}
.hd{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap;border-bottom:2px solid var(--kraft);padding-bottom:10px}
.inv-io{display:flex;gap:6px;align-items:center}
.hd-eyebrow{font-size:10px;letter-spacing:.18em;color:var(--caution);font-weight:600}
.hd h1{margin:2px 0 0;font-family:'Saira Condensed',sans-serif;font-weight:800;font-size:34px;letter-spacing:.04em;text-transform:uppercase}
.tabs button{background:none;border:1px solid var(--line);color:var(--dim);padding:8px 18px;font:inherit;cursor:pointer;text-transform:uppercase;letter-spacing:.1em}
.tabs button.on{color:var(--ink);border-color:var(--kraft);background:var(--panel)}
.settings{display:flex;gap:18px;flex-wrap:wrap;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);font-size:12px;color:var(--dim)}
.settings input[type=number]{width:62px;background:var(--panel2);border:1px solid var(--line);color:var(--ink);font:inherit;padding:3px 6px}
.settings .chk input{accent-color:var(--caution)}
.settings .total b{color:var(--ink)}
.plan{display:grid;grid-template-columns:minmax(340px,1.2fr) minmax(300px,1fr);gap:18px;margin-top:16px}
@media(max-width:900px){.plan{grid-template-columns:1fr}}
.sec-hd{display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.sec-hd h2{font-family:'Saira Condensed',sans-serif;text-transform:uppercase;letter-spacing:.08em;font-size:20px;margin:0}
.hint{font-size:11px;color:var(--dim);max-width:420px}
.card{background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--kraft);margin-bottom:8px;padding:8px 10px}
.card.over{border-left-color:var(--caution)}
.card.used-up{opacity:.5}
.card-row{display:flex;flex-direction:column;gap:0}
.card-main{display:flex;flex-direction:column}
.brand{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim)}
.pname{font-family:'Saira Condensed',sans-serif;font-size:19px;font-weight:600;letter-spacing:.02em}
.pname i{font-style:normal;font-size:10px;vertical-align:middle;margin-left:6px;padding:1px 6px;border-radius:2px}
.pname i.ok{background:#11331f;color:#7ce8a2}
.pname i.ok.ver{background:#0d2f3a;color:#6bd5ff}
.pname i.warn{background:#3a230d;color:#ffb36b;cursor:help}
.inv-section{margin-top:18px}
.inv-section:first-of-type{margin-top:0}
.inv-section-hd{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin:0 0 8px;padding-bottom:6px;border-bottom:1px solid var(--line)}
.inv-section-hd h3{font-family:'Saira Condensed',sans-serif;text-transform:uppercase;letter-spacing:.08em;font-size:15px;margin:0;color:var(--dim)}
.inv-verified .inv-section-hd h3{color:#7ce8a2}
.inv-section-n{font-size:11px;color:var(--dim);font-weight:400}
.inv-section-hint{font-size:11px;color:var(--dim)}
.meta{font-size:11px;color:var(--dim)}
.stat-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.stat-chip{font-size:11px;color:var(--ink);background:var(--panel2);border:1px solid var(--line);padding:2px 7px}
.stat-chip i{font-style:normal;color:var(--dim)}
.tag-row{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-top:6px}
.tag-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);margin-right:2px}
.tag{font-size:11px;background:#1b2342;border:1px solid var(--line);padding:2px 7px;color:var(--ink)}
.tag.fin{border-color:var(--kraft);color:var(--kraft)}
.card-ops{display:flex;align-items:center;gap:6px;flex-wrap:wrap;border-top:1px solid var(--line);padding-top:6px;margin-top:6px}
.qty{display:flex;align-items:center;border:1px solid var(--line)}
.qty button{background:var(--panel2);border:none;color:var(--ink);width:24px;height:24px;cursor:pointer;font:inherit}
.qty span{width:26px;text-align:center}
.avail{font-size:10px;color:var(--dim)}.avail.neg{color:var(--caution);font-weight:600}
.op{background:none;border:1px solid var(--line);color:var(--dim);width:26px;height:26px;cursor:pointer}
.op:hover{color:var(--ink);border-color:var(--kraft)}.op.del:hover{color:var(--caution);border-color:var(--caution)}
.add{background:var(--caution);border:none;color:#fff;padding:5px 10px;font:inherit;font-weight:600;cursor:pointer;margin-left:auto}
.add:disabled{opacity:.35;cursor:default}
.op.lnk{color:#5aa0ff;border-color:#5aa0ff;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}
.op.prev{color:#5aa0ff;border-color:#2f5a8f}.op.prev:hover{color:#fff;border-color:#5aa0ff}
.op.prev.on{color:#fff;background:#2f5a8f;border-color:#5aa0ff}
.vprev{border:1px solid var(--line);background:var(--panel2);margin-bottom:14px}
.vprev-hd{display:flex;align-items:center;gap:6px;padding:6px 8px;font-size:11px;border-bottom:1px solid var(--line)}
.vprev-lbl{text-transform:uppercase;letter-spacing:.12em;font-size:10px;color:var(--dim)}
.vprev-name{color:var(--ink)}.vprev-g{color:var(--dim);font-style:italic}
.vprev-empty{color:var(--dim)}
.vprev-replay{margin-left:auto;background:none;border:1px solid var(--line);color:#5aa0ff;font:inherit;font-size:11px;padding:2px 8px;cursor:pointer}
.vprev-replay:hover{border-color:#5aa0ff;color:#fff}
.vprev-spd{margin-left:auto}
.vprev-spd .spd-btn{padding:2px 7px;font-size:11px}
.vprev-replay+.vprev-replay{margin-left:0}

.overmsg{font-size:11px;color:var(--caution);margin-top:4px}
.edit{margin-top:8px;padding-top:8px;border-top:1px dashed var(--line);display:flex;flex-direction:column;gap:8px;font-size:11px;color:var(--dim)}
.edit label{display:flex;flex-direction:column;gap:2px}
.edit input,.edit select{width:80px;background:var(--bg);border:1px solid var(--line);color:var(--ink);font:inherit;padding:3px 5px}
.grp{border:1px solid var(--line);background:var(--panel2);padding:8px 10px}
.grp-hd{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--kraft);margin-bottom:7px;border-bottom:1px solid var(--line);padding-bottom:4px}
.grp-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.launch-row{align-items:center;gap:14px}
.seg{display:inline-flex;border:1px solid var(--line)}
.seg button{background:var(--panel2);border:none;color:var(--dim);padding:5px 12px;font:inherit;font-size:11px;cursor:pointer;border-right:1px solid var(--line)}
.seg button:last-child{border-right:none}
.seg button.on{background:#1b2342;color:var(--ink)}
.chips-edit{width:100%;display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.chips-edit .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;margin-right:4px}
.tog{background:var(--panel2);border:1px solid var(--line);color:var(--dim);padding:3px 8px;font:inherit;font-size:11px;cursor:pointer}
.tog.on{color:var(--ink);border-color:var(--kraft);background:#1b2342}
.tog.sw{padding-left:18px;position:relative}
.tog.sw::before{content:"";position:absolute;left:5px;top:50%;transform:translateY(-50%);width:8px;height:8px;border-radius:50%;background:var(--sw)}
.fan-tog{flex-direction:row !important;align-items:center;gap:5px !important;width:auto}
.fan-tog input{width:auto !important}
.note{width:100%;font-size:11px;color:var(--kraft);margin:4px 0 0}
.ghost{background:none;border:1px solid var(--kraft);color:var(--kraft);padding:6px 12px;font:inherit;cursor:pointer;text-transform:uppercase;font-size:11px;letter-spacing:.08em}
.ghost:hover:not(:disabled){background:var(--panel)}
.ghost:disabled{opacity:.4;cursor:not-allowed}
.volley{background:var(--panel2);border:1px solid var(--line);margin-bottom:10px;padding:8px 10px;cursor:pointer}
.volley.active{border-color:var(--caution);box-shadow:0 0 0 1px var(--caution)}
.v-hd{display:flex;align-items:center;gap:10px}
.v-hd b{font-family:'Saira Condensed',sans-serif;font-size:17px;text-transform:uppercase;letter-spacing:.05em}
.v-meta{font-size:11px;color:var(--dim)}
.v-ops{margin-left:auto;display:flex;gap:4px}
.v-ops button{background:none;border:1px solid var(--line);color:var(--dim);width:22px;height:22px;cursor:pointer;font-size:11px}
.empty{font-size:11px;color:var(--dim);padding:8px 0}
.chip{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px}
.chip.drag-over{outline:1px solid var(--kraft);background:var(--panel);border-radius:2px}
.grip{flex:0 0 auto;color:var(--dim);cursor:grab;line-height:1;font-size:14px;touch-action:none;user-select:none}
.grip:active{cursor:grabbing}
.chip-name{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chip-name em{font-style:normal;color:var(--dim);font-size:10px}
.chip button{background:none;border:none;color:var(--dim);cursor:pointer}
.sim{margin-top:14px}
.canvas-wrap{border:1px solid var(--line)}
.canvas-wrap canvas{display:block;width:100%}
.sim-ctl{display:flex;gap:10px;align-items:center;margin-top:10px;flex-wrap:wrap}
.go{background:var(--caution);border:none;color:#fff;font:inherit;font-weight:600;padding:12px 22px;cursor:pointer;font-size:15px;text-transform:uppercase;letter-spacing:.06em}
.go:disabled{opacity:.35;cursor:default}
.msg{color:var(--kraft);font-size:12px}
.spd{display:flex;align-items:center;gap:4px}
.spd-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);margin-right:4px}
.spd-btn{background:var(--panel2);border:1px solid var(--line);color:var(--dim);padding:6px 10px;font:inherit;font-size:12px;cursor:pointer}
.spd-btn.on{color:var(--ink);border-color:var(--caution);background:#2a1505}
.strip{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.pill{border:1px solid var(--line);color:var(--dim);font-size:11px;padding:3px 10px}
.pill.done{color:#5a6584;text-decoration:line-through}
.pill.next{border-color:var(--caution);color:var(--ink)}
.now-deck{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
.now-deck-col{flex:1;min-width:200px;border:1px solid var(--line);padding:8px 12px}
.now-deck-col h4{margin:0 0 4px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);font-weight:600}
.now-deck-col .empty{font-size:12px;color:var(--dim);padding:4px 0}
.now-deck-col.firing{border-color:var(--caution)}
.now-deck-col.firing h4{color:var(--ink)}
.now-deck-col.firing:has(.now-deck-chips){animation:nowfire 1s ease-in-out infinite}
@keyframes nowfire{0%,100%{box-shadow:0 0 0 0 transparent}50%{box-shadow:0 0 12px 0 var(--caution)}}
.foot{font-size:11px;color:var(--dim);margin:0 0 10px;}
.tail-col-lbl{display:flex;flex-direction:column;gap:2px}
.tail-col-lbl>.lbl{margin-right:0}
.tail-col-lbl select{background:var(--panel2);border:1px solid var(--line);color:var(--ink);font:inherit;font-size:11px;padding:2px 4px}
.spiral-chk{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--dim);cursor:pointer;user-select:none}
.spiral-chk input{cursor:pointer;accent-color:var(--accent,#5aa0ff)}
.pat-note{font-size:11px;color:var(--dim)}
.pat-edit{width:100%;display:flex;flex-direction:column;gap:5px;margin-top:4px}
.pat-hd{display:flex;justify-content:space-between;align-items:center;width:100%}
.pat-repeat{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--dim)}
.pat-row{display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--line);padding:4px 6px;flex-wrap:wrap}
.pat-row select{background:var(--panel2);border:1px solid var(--line);color:var(--ink);font:inherit;font-size:11px;padding:2px 4px}
.pat-row input[type=number]{width:42px;background:var(--panel2);border:1px solid var(--line);color:var(--ink);font:inherit;font-size:11px;padding:2px 4px}
.pat-idx{font-size:10px;color:var(--dim);min-width:12px}
.pat-field{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--dim)}
.pat-rm{background:none;border:none;color:var(--dim);cursor:pointer;margin-left:auto}
.pat-rm:hover{color:var(--caution)}
.pat-add{font-size:11px;padding:3px 8px;align-self:flex-start}
.fk-empty{font-size:11px;color:var(--dim);margin:2px 0 0;width:100%}
.url-lbl{width:100%}.url-lbl input{width:100%;min-width:0}
.test-wrap{display:grid;grid-template-columns:240px 1fr;gap:18px;margin-top:16px;align-items:start}
@media(max-width:900px){.test-wrap{grid-template-columns:1fr}}
.test-ctrl{display:flex;flex-direction:column;gap:12px}
.test-panel{background:var(--panel);border:1px solid var(--line);padding:10px}
.test-panel-hd{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--dim);margin-bottom:8px}
.test-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin:6px 0}
.test-select{background:var(--panel2);border:1px solid var(--line);color:var(--ink);font:inherit;font-size:11px;padding:3px 5px}
.test-select-wide{width:100%;margin-bottom:6px}
.test-fire{padding:8px 18px;font-size:13px;margin-top:6px}
.test-kind-btn{font-size:11px;padding:3px 8px;color:var(--dim)}
.test-finale-lbl{color:var(--kraft)}
.test-finale-btn{border-color:var(--kraft);color:var(--kraft)}
.test-canvas-wrap{border:1px solid var(--line)}
.test-canvas-wrap canvas{display:block;width:100%}
.test-wrap2{margin-top:16px}
.wb{display:flex;flex-direction:column;gap:12px}
.wb-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.wb-name{background:var(--panel2);border:1px solid var(--line);color:var(--ink);font:inherit;font-size:14px;padding:5px 8px;min-width:160px}
.wb-meta{font-size:11px;color:var(--dim)}
.wb-details{border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.wb-details-tog{background:none;border:none;color:var(--dim);font:inherit;font-size:10px;text-transform:uppercase;letter-spacing:.12em;cursor:pointer;padding:7px 2px}
.wb-details-tog:hover{color:var(--ink)}
.wb-details-body{display:flex;flex-wrap:wrap;align-items:center;gap:16px;padding:0 2px 10px}
.wb-details-body label{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--dim)}
.wb-details-body input{background:var(--panel2);border:1px solid var(--line);color:var(--ink);font:inherit;font-size:11px;padding:3px 5px}
.wb-link-fld{flex:1;min-width:220px}
.wb-link-fld input{flex:1}
.wb-link-go{color:var(--kraft);text-decoration:none;border:1px solid var(--line);padding:2px 6px;font-size:12px}
.wb-link-go[aria-disabled=true]{opacity:.35;pointer-events:none}
.wb-note-fld{flex:1;min-width:200px}
.wb-note-fld input{flex:1}
.wb-stars{display:flex;align-items:center;gap:1px}
.wb-star{background:none;border:none;cursor:pointer;font-size:15px;line-height:1;padding:0 1px;color:var(--line)}
.wb-star.on{color:#e8b53a}
.wb-star-clear{background:none;border:none;cursor:pointer;color:var(--dim);font-size:11px;margin-left:4px}
.wb-grid{display:grid;grid-template-columns:200px 240px 1fr;gap:14px;align-items:start}
.wb-col{display:flex;flex-direction:column;gap:4px;background:var(--panel);border:1px solid var(--line);padding:10px}
.wb-col-hd{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--dim);margin-bottom:6px}
.wb-item{display:flex;align-items:center;justify-content:space-between;gap:6px;padding:5px 7px;border:1px solid var(--line);cursor:pointer;font-size:12px}
.wb-item.on{border-color:var(--accent,#5aa0ff);background:var(--panel2)}
.wb-item-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wb-item-ops{display:flex;gap:2px;flex-shrink:0}
.wb-item-ops button{background:none;border:1px solid var(--line);color:var(--dim);cursor:pointer;width:22px;height:22px;font-size:11px}
.wb-add{align-self:flex-start;font-size:11px;padding:3px 8px;margin-top:4px}
.wb-phase-ctl,.wb-shot-ed{display:flex;flex-direction:column;gap:7px;margin-top:10px;border-top:1px solid var(--line);padding-top:10px}
.wb-phase-ctl label,.wb-shot-ed label{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--dim)}
.wb-phase-ctl input,.wb-phase-ctl select,.wb-shot-ed input,.wb-shot-ed select{background:var(--panel2);border:1px solid var(--line);color:var(--ink);font:inherit;font-size:11px;padding:3px 5px;width:90px}
.wb-chk{flex-direction:row !important}
.wb-name-fld{flex:1}
.wb-name-fld input{width:100% !important}
.wb-layers{display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.wb-spec{font-size:10px;color:var(--dim);word-break:break-all}
.wb-spec code{color:var(--ink)}
.wb-canvas{border:1px solid var(--line)}
.wb-canvas canvas{display:block;width:100%}
.wb-audition{display:flex;gap:8px;flex-wrap:wrap;padding:8px;background:var(--panel)}
@media(max-width:900px){.wb-grid{grid-template-columns:1fr}}
.prod-review{display:flex;align-items:center;gap:10px;border-top:1px solid var(--line);padding-top:7px;margin-top:7px;flex-wrap:wrap}
.stars{display:flex;gap:2px;line-height:1}
.stars span{cursor:pointer;user-select:none;transition:color .1s}
.note-add{background:none;border:none;color:#5aa0ff;font:inherit;font-size:11px;cursor:pointer;padding:0;text-decoration:underline}
.note-add-sm{background:none;border:none;color:#5aa0ff;font:inherit;font-size:10px;cursor:pointer;padding:0}
.note-area{display:flex;align-items:flex-start;gap:6px;width:100%}
.note-area textarea{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--ink);font:inherit;font-size:11px;padding:5px 7px;resize:vertical;min-height:44px}
.note-close{background:none;border:none;color:var(--dim);cursor:pointer;font-size:12px;padding:0 2px}
.note-close:hover{color:var(--caution)}
.v-note-area{padding:5px 0 4px;display:flex;align-items:flex-start;gap:6px}
.v-note-area textarea{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--ink);font:inherit;font-size:11px;padding:4px 7px;resize:vertical;min-height:38px}
.note-preview{background:none;border:none;color:var(--dim);font:inherit;font-size:10px;cursor:pointer;padding:0;text-align:left;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.note-preview:hover{color:var(--ink)}

/* ---- mobile / phone layout (<=480px) ---- */
@media(max-width:480px){
 .fsp{padding:12px}
 .hd h1{font-size:26px}
 .tabs{display:flex;width:100%}
 .tabs button{flex:1;padding:10px 6px;text-align:center}
 .settings{gap:10px}

 /* inventory I/O buttons wrap instead of overflow */
 .inv-io{flex-wrap:wrap}

 /* bigger touch targets */
 .qty button{width:32px;height:32px}
 .op{width:34px;height:34px}
 .add{padding:10px 12px;flex:1 1 100%;margin-left:0;text-align:center}
 .v-ops button{width:32px;height:32px;font-size:13px}
 .chip button{min-width:32px;min-height:32px}
 .grip{min-width:32px;min-height:32px;display:inline-flex;align-items:center;justify-content:center}

 /* volley header: title+meta+ops on row 1, note drops to its own row */
 .v-hd{flex-wrap:wrap}
 .v-ops{order:4}
 .note-add-sm,.note-preview{order:5;flex-basis:100%;max-width:100%}

 /* simulate controls: full-width GO, prominent status, paired ghosts */
 .go{order:1;flex-basis:100%;padding:16px;font-size:16px}
 .sim-ctl .msg{order:2;flex-basis:100%;text-align:center;font-size:14px}
 .sim-ctl .ghost{order:3;flex:1}
 .spd{order:4;flex-basis:100%;justify-content:center}

 /* volley strip becomes a tap-friendly grid */
 .strip{display:grid;grid-template-columns:repeat(5,1fr);gap:4px}
 .pill{text-align:center;padding:8px 2px}
}
